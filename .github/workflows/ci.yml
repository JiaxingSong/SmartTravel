name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify import
        run: |
          python -c "from smart_travel.config import load_config; print('Config OK')"
          python -c "from smart_travel.agents import create_agent_options; print('Agent OK')"
          python -c "from smart_travel.cache import InMemoryCacheStore; print('Cache OK')"
          python -c "from smart_travel.memory import InMemoryMemoryStore; print('Memory OK')"
